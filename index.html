    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body { font-family: 'Kanit', sans-serif; background: radial-gradient(circle at center, #1e293b 0%, var(--bg-dark) 100%); color: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; overflow: hidden; }
        
        .container { background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 40px 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.02); max-width: 400px; width: 85%; animation: slideUpFade 0.8s ease-out forwards; opacity: 0; transform: translateY(20px); z-index: 10; }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }

        .spinner-wrapper { position: relative; width: 70px; height: 70px; margin: 0 auto 25px auto; }
        .spinner-ring-1, .spinner-ring-2 { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 3px solid transparent; }
        .spinner-ring-1 { border-top-color: var(--primary); border-bottom-color: var(--secondary); animation: spin1 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; }
        .spinner-ring-2 { width: 70%; height: 70%; top: 15%; left: 15%; border-left-color: var(--secondary); border-right-color: var(--primary); animation: spin2 2s linear infinite reverse; }
        @keyframes spin1 { 100% { transform: rotate(360deg); } }
        @keyframes spin2 { 100% { transform: rotate(360deg); } }

        .title { font-size: 22px; font-weight: 600; margin-bottom: 12px; background: linear-gradient(90deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #94a3b8; font-size: 15px; font-weight: 300; line-height: 1.6; margin-bottom: 20px; }
        
        .code-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; font-family: monospace; font-size: 20px; color: #a78bfa; margin-bottom: 25px; letter-spacing: 2px; font-weight: bold; display: none; border: 1px dashed rgba(167, 139, 250, 0.5); }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 28px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-decoration: none; font-weight: 500; font-size: 16px; font-family: 'Kanit', sans-serif; border-radius: 14px; border: none; cursor: pointer; transition: all 0.3s; width: 100%; box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.5); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -10px rgba(139, 92, 246, 0.7); }
        .btn:active { transform: scale(0.95); }

        .footer { margin-top: 25px; font-size: 13px; color: #64748b; font-weight: 300; }
        .footer a { color: #60a5fa; text-decoration: none; font-weight: 500; }
        .btn.success { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 10px 20px -10px rgba(16, 185, 129, 0.5); }

        /* ================= UI สถิติ มุมซ้ายล่าง ================= */
        .stats-widget {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 12px;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 20;
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
            font-size: 14px;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #cbd5e1;
        }

        .stat-item svg {
            width: 16px;
            height: 16px;
        }

        .heart-btn {
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .heart-btn:hover { transform: scale(1.1); }
        .heart-btn:active { transform: scale(0.9); }

        .heart-btn.liked { color: #ef4444; }
        .heart-btn.liked svg { fill: #ef4444; stroke: #ef4444; animation: heartBeat 0.3s ease-in-out; }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

<body>

    <div class="container" id="mainCard">
        <div class="spinner-wrapper" id="spinner">
            <div class="spinner-ring-1"></div>
            <div class="spinner-ring-2"></div>
        </div>
        
        <div class="title" id="mainTitle">เข้าหน้าแลกโค้ดเกม RoV</div>
        <div class="subtitle" id="mainSubtitle">
            ระบบจะเปิดหน้าแลกโค้ดในเกมอัตโนมัติ<br>
            กดปุ่มด้านล่างเพื่อเข้าเกมได้เลย!
        </div>

        <div class="code-box" id="codeDisplay"></div>
        
        <button class="btn" id="actionBtn" onclick="openROV()">
            <svg id="btnIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
            <span id="btnText">เข้าหน้าแลกโค้ดเกม RoV เลย</span>
        </button>

        <div class="footer">
            พัฒนาโดย <a href="https://nattapat2871.me" target="_blank">nattapat2871</a>
        </div>
    </div>

    <div class="stats-widget">
        <div class="stat-item" title="จำนวนครั้งที่มีการกดเข้าเกม">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <span id="viewCount">-</span>
        </div>
        <div class="stat-item heart-btn" id="likeWidget" onclick="toggleLike()" title="กดใจให้กำลังใจผู้พัฒนา">
            <svg id="heartIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            <span id="likeCount">-</span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const codeToRedeem = urlParams.get('code');

        // ================== API CONFIG ==================
        const API_BASE = "https://ame-api.nattapat2871.me/api";
        const SITE_NAME = "rov-redeem-page"; 
        
        let isLiked = localStorage.getItem(`liked_${SITE_NAME}`) === "true";

        function loadStats() {
            fetch(`${API_BASE}/page-stats?site=${SITE_NAME}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('viewCount').innerText = data.view_count || 0;
                    document.getElementById('likeCount').innerText = data.like_count || 0;
                })
                .catch(err => console.error("ดึงสถิติไม่สำเร็จ:", err));

            if (isLiked) {
                document.getElementById('likeWidget').classList.add('liked');
            }
        }

        function toggleLike() {
            const likeWidget = document.getElementById('likeWidget');
            const likeText = document.getElementById('likeCount');
            let currentLikes = parseInt(likeText.innerText) || 0;

            if (isLiked) {
                isLiked = false;
                currentLikes = Math.max(0, currentLikes - 1);
                likeWidget.classList.remove('liked');
                localStorage.setItem(`liked_${SITE_NAME}`, "false");
                fetch(`${API_BASE}/like?site=${SITE_NAME}&action=unlike`, { method: 'POST' }).catch(e=>{});
            } else {
                isLiked = true;
                currentLikes += 1;
                likeWidget.classList.add('liked');
                localStorage.setItem(`liked_${SITE_NAME}`, "true");
                fetch(`${API_BASE}/like?site=${SITE_NAME}&action=like`, { method: 'POST' }).catch(e=>{});
            }
            likeText.innerText = currentLikes;
        }

        function countViewAndJump() {
            fetch(`${API_BASE}/view?site=${SITE_NAME}`, { method: 'POST' }).catch(e=>{});
            setTimeout(() => {
                let payload = { ContentUrl: "", actions: [{ name: "OpenUrlInGame", Url: "https://redeem.rov.in.th/" }] };
                let encodedPayload = encodeURIComponent(JSON.stringify(payload));
                window.location.href = `ngame1138://deeplink?type=common&dest=${encodedPayload}`;
            }, 300);
        }

        function fallbackCopyTextToClipboard(text) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0"; textArea.style.left = "0"; textArea.style.position = "fixed"; textArea.style.opacity = "0";
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
        }

        function openROV() {
            let btn = document.getElementById('actionBtn');
            let icon = document.getElementById('btnIcon');
            let text = document.getElementById('btnText');

            btn.classList.add('success');
            icon.innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';

            if (codeToRedeem) {
                text.innerText = "คัดลอกแล้ว!";
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(codeToRedeem).then(function() {
                        countViewAndJump();
                    }).catch(function() {
                        fallbackCopyTextToClipboard(codeToRedeem);
                        countViewAndJump();
                    });
                } else {
                    fallbackCopyTextToClipboard(codeToRedeem);
                    countViewAndJump();
                }
            } else {
                text.innerText = "กำลังเข้าสู่เกม...";
                countViewAndJump(); 
            }
        }

        window.onload = function() {
            loadStats(); 

            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (!isMobile) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('actionBtn').style.display = 'none';
                document.getElementById('codeDisplay').style.display = 'none';
                document.getElementById('mainTitle').innerText = "🚫 กรุณาเปิดลิงก์นี้บนมือถือ";
                document.getElementById('mainSubtitle').innerHTML = "ระบบเติมโค้ดอัตโนมัติรองรับเฉพาะ<br>สมาร์ทโฟนที่มีเกม RoV ติดตั้งอยู่เท่านั้นครับ";
            } else {
                if(codeToRedeem) {
                    document.getElementById('mainTitle').innerText = "เตรียมเติมโค้ดเกม RoV!";
                    document.getElementById('mainSubtitle').innerHTML = "ระบบจะก๊อปปี้โค้ดให้คุณอัตโนมัติ<br>เข้าเกมแล้วกด \"วาง (Paste)\" ได้เลย!";
                    
                    let codeBox = document.getElementById('codeDisplay');
                    codeBox.innerText = codeToRedeem;
                    codeBox.style.display = 'block';
                    
                    document.getElementById('btnText').innerText = "คัดลอกโค้ดและเข้าเกม";
                    document.getElementById('btnIcon').innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>';
                }
            }
        };
    </script>

</body>
